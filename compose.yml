networks:
  frontend:
    external: false
  backend:
    external: false

volumes:
  openavc-data:
  grafana_data:
  influxdb2-data:
  influxdb2-config:

services:
  openavc:
    image: ghcr.io/open-avc/openavc:latest
    container_name: openavc
    network_mode: host
    cap_add:
      - NET_RAW
    volumes:
      - openavc-data:/data
    restart: unless-stopped
    # For serial/USB device passthrough, uncomment:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
  
  influxdb2:
    image: influxdb:2
    container_name: av_influxdb2
    ports:
      - 8086:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
      DOCKER_INFLUXDB_INIT_ORG: docs
      DOCKER_INFLUXDB_INIT_BUCKET: home
    volumes:
      - type: volume
        source: influxdb2-data
        target: /var/lib/influxdb2
      - type: volume
        source: influxdb2-config
        target: /etc/influxdb2
    networks:
      backend:

  grafana:
    image: grafana/grafana:11.0.0
    container_name: av_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      # Needed so the provisioned datasource can interpolate ${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - influxdb2
      - telegraf
    networks:
      backend:
      frontend:

  telegraf:
    image: telegraf
    container_name: av_telegraf
    restart: unless-stopped
    networks:
      - backend
    env_file:
      - .env
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /etc:/hostfs/etc
      - /proc:/hostfs/proc
      - /sys:/hostfs/sys
      - /var:/hostfs/var
      - /run:/hostfs/run
    environment:
      - HOST_ETC=/hostfs/etc
      - HOST_PROC=/hostfs/proc
      - HOST_SYS=/hostfs/sys
      - HOST_VAR=/hostfs/var
      - HOST_RUN=/hostfs/run
      - HOST_MOUNT_PREFIX=/hostfs
    build:
      context: ./telegraf
      dockerfile: Dockerfile


global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    site: 'broadcast_av'

rule_files:
  - "alerts/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add Alertmanager here if needed

scrape_configs:

  # --- Custom AV Exporter (Kiloview N5, N6 + Blackmagic Web Presenter) ---
  - job_name: 'av_devices'
    static_configs:
      - targets: ['av_exporter:9200']
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics

  # --- Prometheus self-monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
